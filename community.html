<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올케어 | 후기 & 문의 게시판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --warm-cream:#fdf6ee; --deep-brown:#3d2b1f; --amber:#d4813a;
  --amber-light:#f2c98a; --sage:#7a9e7e; --sage-light:#b8d4ba;
  --warm-white:#fffbf5; --text-main:#2c1f14; --text-sub:#7a6a5a; --soft-brown:#8b6b4a;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--warm-cream);color:var(--text-main);}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 48px;display:flex;justify-content:space-between;align-items:center;background:rgba(253,246,238,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(139,107,74,0.15);}
.nav-logo{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:900;color:var(--amber);text-decoration:none;}
.nav-logo span{color:var(--sage);}
.nav-back{font-size:13px;color:var(--text-sub);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color 0.2s;}
.nav-back:hover{color:var(--amber);}
.board-header{padding:120px 48px 48px;background:linear-gradient(160deg,#fdf6ee,#f7ede0);text-align:center;}
.sec-label{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:2.5px;color:var(--amber);text-transform:uppercase;margin-bottom:16px;}
.sec-label::before{content:'';width:20px;height:2px;background:var(--amber);display:block;}
.board-header h1{font-family:'Noto Serif KR',serif;font-size:clamp(28px,5vw,46px);font-weight:900;color:var(--deep-brown);margin-bottom:12px;}
.board-header p{font-size:15px;color:var(--text-sub);line-height:1.8;}
.board-wrap{max-width:860px;margin:0 auto;padding:40px 24px 80px;}
.svc-tabs{display:flex;gap:10px;margin-bottom:32px;}
.svc-tab{flex:1;padding:14px 20px;border-radius:14px;border:1.5px solid rgba(212,129,58,0.2);background:white;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:600;color:var(--text-sub);transition:all 0.2s ease;text-align:center;}
.svc-tab:hover{border-color:var(--amber);color:var(--amber);}
.svc-tab.active{background:var(--amber);border-color:var(--amber);color:white;}
.svc-tab.active.green{background:var(--sage);border-color:var(--sage);}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.post-count{font-size:13px;color:var(--text-sub);}
.btn-write{background:linear-gradient(135deg,var(--amber),#e8973f);color:white;font-size:13px;font-weight:700;padding:10px 22px;border:none;border-radius:50px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;box-shadow:0 4px 16px rgba(212,129,58,0.3);transition:all 0.2s ease;}
.btn-write:hover{transform:translateY(-1px);}
.btn-write.green{background:linear-gradient(135deg,var(--sage),#8db592);box-shadow:0 4px 16px rgba(122,158,126,0.3);}
.post-list{display:flex;flex-direction:column;gap:12px;}
.post-card{background:white;border-radius:16px;border:1px solid rgba(139,107,74,0.1);padding:20px 24px;cursor:pointer;transition:all 0.2s ease;box-shadow:0 2px 12px rgba(61,43,31,0.05);}
.post-card:hover{border-color:rgba(212,129,58,0.3);box-shadow:0 6px 24px rgba(61,43,31,0.1);transform:translateY(-2px);}
.post-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.post-tag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:50px;letter-spacing:0.5px;}
.post-tag.pet{background:rgba(212,129,58,0.12);color:#a0600f;}
.post-tag.senior{background:rgba(122,158,126,0.12);color:#4a7050;}
.post-tag.review{background:rgba(201,168,76,0.12);color:#8a7020;}
.post-tag.inquiry{background:rgba(139,107,74,0.12);color:#6b5040;}
.post-title{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:700;color:var(--deep-brown);margin-bottom:6px;line-height:1.4;}
.post-preview{font-size:13px;color:var(--text-sub);line-height:1.6;}
.post-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;}
.post-info{font-size:11px;color:var(--text-sub);}
.post-info span{margin-right:12px;}
.post-reply-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:50px;background:rgba(122,158,126,0.15);color:var(--sage);}
.empty-state{text-align:center;padding:60px 24px;color:var(--text-sub);}
.empty-icon{font-size:48px;margin-bottom:16px;}

/* OVERLAY COMMON */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;}

/* MODAL */
.modal-box{background:white;border-radius:24px;max-width:640px;width:100%;max-height:88vh;overflow-y:auto;}
.modal-head{padding:28px 32px 20px;border-bottom:1px solid #f0e8e0;}
.modal-close-btn{float:right;background:none;border:none;font-size:24px;cursor:pointer;color:#bbb;line-height:1;}
.modal-close-btn:hover{color:#888;}
.modal-head-meta{display:flex;gap:8px;margin-bottom:10px;}
.modal-title{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:900;color:var(--deep-brown);line-height:1.3;margin-bottom:8px;}
.modal-info{font-size:12px;color:var(--text-sub);}
.modal-body{padding:24px 32px;}
.modal-content{font-size:14px;line-height:1.9;color:var(--text-main);white-space:pre-wrap;}
.modal-photo{margin-top:16px;border-radius:12px;overflow:hidden;max-height:320px;}
.modal-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.admin-reply{margin:20px 0 0;background:linear-gradient(135deg,rgba(122,158,126,0.08),rgba(184,212,186,0.12));border-left:3px solid var(--sage);border-radius:0 12px 12px 0;padding:16px 20px;}
.admin-reply-label{font-size:11px;font-weight:700;color:var(--sage);letter-spacing:1px;margin-bottom:8px;}
.admin-reply-content{font-size:13px;line-height:1.8;color:var(--text-main);white-space:pre-wrap;}
.admin-reply-form{margin-top:16px;padding-top:16px;border-top:1px solid #f0e8e0;}
.admin-reply-input{width:100%;padding:10px 14px;border:1.5px solid rgba(122,158,126,0.3);border-radius:10px;font-size:13px;font-family:'Noto Sans KR',sans-serif;resize:vertical;min-height:80px;}
.admin-reply-input:focus{outline:none;border-color:var(--sage);}
.btn-admin-reply{margin-top:8px;padding:9px 20px;background:var(--sage);color:white;border:none;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-del-admin{padding:8px 14px;background:none;border:1.5px solid rgba(224,80,80,0.3);border-radius:50px;font-size:12px;cursor:pointer;color:#c04040;font-family:'Noto Sans KR',sans-serif;margin-left:8px;}
.modal-foot{padding:0 32px 24px;display:flex;gap:10px;margin-top:8px;}
.btn-modal-close{padding:12px 24px;background:none;border:1.5px solid rgba(212,129,58,0.25);border-radius:50px;font-size:14px;cursor:pointer;color:var(--text-sub);font-family:'Noto Sans KR',sans-serif;}
.btn-del-user{padding:12px 20px;background:none;border:1.5px solid rgba(224,80,80,0.2);border-radius:50px;font-size:13px;cursor:pointer;color:#c04040;font-family:'Noto Sans KR',sans-serif;}

/* WRITE FORM */
.form-box{background:white;border-radius:24px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;}
.form-head{background:linear-gradient(135deg,#c07830,#d4813a);padding:24px 28px;border-radius:24px 24px 0 0;}
.form-head.green-head{background:linear-gradient(135deg,var(--sage),#8db592);}
.form-htitle{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:900;color:white;}
.form-hsub{font-size:12px;color:rgba(255,255,255,0.75);margin-top:4px;}
.form-body{padding:24px 28px;display:flex;flex-direction:column;gap:14px;}
.f-label{font-size:12px;color:var(--text-sub);font-weight:600;display:block;margin-bottom:5px;}
.f-input,.f-textarea,.f-select{width:100%;padding:11px 14px;border:1.5px solid rgba(212,129,58,0.2);border-radius:10px;font-size:14px;font-family:'Noto Sans KR',sans-serif;background:white;color:var(--text-main);resize:vertical;}
.f-input:focus,.f-textarea:focus,.f-select:focus{outline:none;border-color:var(--amber);}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.f-notice{font-size:11px;color:var(--text-sub);line-height:1.7;background:#faf7f3;padding:12px 14px;border-radius:8px;}
.photo-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.photo-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;border:1px solid rgba(139,107,74,0.15);}
.form-foot{padding:0 28px 24px;display:flex;gap:10px;}
.btn-submit{flex:1;padding:13px;background:linear-gradient(135deg,#c07830,#d4813a);color:white;border:none;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-submit.green{background:linear-gradient(135deg,var(--sage),#8db592);}
.btn-cancel{padding:13px 20px;background:none;border:1.5px solid rgba(212,129,58,0.25);border-radius:50px;font-size:14px;cursor:pointer;color:var(--text-sub);font-family:'Noto Sans KR',sans-serif;}

/* PIN MODAL */
.pw-box{background:white;border-radius:20px;max-width:340px;width:100%;padding:32px 28px;text-align:center;}
.pw-icon{font-size:40px;margin-bottom:14px;}
.pw-title{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:900;color:var(--deep-brown);margin-bottom:6px;}
.pw-sub{font-size:12px;color:var(--text-sub);margin-bottom:20px;white-space:pre-line;}
.pw-input{width:100%;padding:12px 14px;border:1.5px solid rgba(212,129,58,0.25);border-radius:10px;font-size:15px;text-align:center;margin-bottom:8px;font-family:'Noto Sans KR',sans-serif;}
.pw-input:focus{outline:none;border-color:var(--amber);}
.pw-error{font-size:12px;color:#e05050;margin-bottom:12px;height:16px;}
.pw-btns{display:flex;gap:8px;}
.pw-btn-ok{flex:1;padding:12px;background:linear-gradient(135deg,#c07830,#d4813a);color:white;border:none;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.pw-btn-cancel{padding:12px 16px;background:none;border:1.5px solid rgba(212,129,58,0.2);border-radius:50px;font-size:14px;cursor:pointer;color:var(--text-sub);font-family:'Noto Sans KR',sans-serif;}

footer{background:#1e140c;padding:28px 48px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.footer-logo{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:900;color:var(--amber);}
.footer-info{font-size:11px;color:rgba(255,255,255,0.3);line-height:1.8;}

@media(max-width:768px){
  nav{padding:16px 24px;}
  .board-header{padding:100px 24px 36px;}
  .board-wrap{padding:28px 16px 60px;}
  .svc-tabs{flex-direction:column;}
  .f-row{grid-template-columns:1fr;}
  .modal-head,.modal-body,.modal-foot{padding-left:20px;padding-right:20px;}
  .form-body,.form-foot,.form-head{padding-left:20px;padding-right:20px;}
  footer{padding:24px;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">올<span>케</span>어</a>
  <a href="index.html" class="nav-back">← 홈으로</a>
</nav>

<div class="board-header">
  <div class="sec-label">Community</div>
  <h1>후기 & 문의 게시판</h1>
  <p>서비스 이용 후기나 궁금한 점을 남겨주세요.<br>올케어가 직접 답변드립니다.</p>
</div>

<div class="board-wrap">
  <div class="svc-tabs">
    <button class="svc-tab active" id="tab_pet" onclick="switchTab('pet')">🐾 펫택시</button>
    <button class="svc-tab" id="tab_senior" onclick="switchTab('senior')">🏥 어르신 병원 동행</button>
  </div>
  <div class="top-bar">
    <div class="post-count" id="postCount">0개의 게시글</div>
    <button class="btn-write" id="btnWrite" onclick="openWriteForm()">✏️ 글쓰기</button>
  </div>
  <div class="post-list" id="postList"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">📝</div>
    <p>아직 게시글이 없어요.<br>첫 번째 후기나 문의를 남겨주세요!</p>
  </div>
</div>

<footer>
  <div class="footer-logo">올케어</div>
  <div class="footer-info">동물운송업 등록 | 서울 송파구 잠실동<br>010-7472-5896 · @allcare</div>
</footer>

<script>
const ADMIN_PW = 'dkstmdgh84!';
let currentTab = 'pet';
let posts = JSON.parse(localStorage.getItem('ac_posts') || '[]');
let photoData = null;

function savePosts(){ localStorage.setItem('ac_posts', JSON.stringify(posts)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function formatDate(ts){
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function isAdmin(){ return sessionStorage.getItem('ac_admin')==='1'; }

function switchTab(tab){
  currentTab = tab;
  document.getElementById('tab_pet').className = 'svc-tab' + (tab==='pet'?' active':'');
  document.getElementById('tab_senior').className = 'svc-tab' + (tab==='senior'?' active green':'');
  document.getElementById('btnWrite').className = 'btn-write' + (tab==='senior'?' green':'');
  renderList();
}

function renderList(){
  const list = document.getElementById('postList');
  const empty = document.getElementById('emptyState');
  const filtered = posts.filter(p=>p.tab===currentTab).sort((a,b)=>b.ts-a.ts);
  document.getElementById('postCount').textContent = `${filtered.length}개의 게시글`;
  if(!filtered.length){ list.innerHTML=''; empty.style.display=''; return; }
  empty.style.display='none';
  list.innerHTML = filtered.map(p=>`
    <div class="post-card" onclick="openPost('${p.id}')">
      <div class="post-meta">
        <span class="post-tag ${p.tab}">${p.tab==='pet'?'🐾 펫택시':'🏥 어르신 동행'}</span>
        <span class="post-tag ${p.type}">${p.type==='review'?'⭐ 후기':'💬 문의'}</span>
        ${p.photo?'<span style="font-size:11px;color:var(--text-sub)">📷 사진</span>':''}
        ${p.adminReply?'<span class="post-reply-badge">✅ 답변완료</span>':''}
      </div>
      <div class="post-title">${p.title}</div>
      <div class="post-preview">${p.content.slice(0,70)}${p.content.length>70?'...':''}</div>
      <div class="post-footer">
        <div class="post-info"><span>${p.author}</span><span>${formatDate(p.ts)}</span></div>
      </div>
    </div>`).join('');
}

function openPost(id){
  const p = posts.find(x=>x.id===id);
  if(!p) return;
  const ol = document.createElement('div');
  ol.className='overlay'; ol.id='postModal';
  ol.onclick = e=>{ if(e.target===ol) ol.remove(); };
  ol.innerHTML=`<div class="modal-box">
    <div class="modal-head">
      <button class="modal-close-btn" onclick="document.getElementById('postModal').remove()">×</button>
      <div class="modal-head-meta">
        <span class="post-tag ${p.tab}">${p.tab==='pet'?'🐾 펫택시':'🏥 어르신 동행'}</span>
        <span class="post-tag ${p.type}">${p.type==='review'?'⭐ 후기':'💬 문의'}</span>
      </div>
      <div class="modal-title">${p.title}</div>
      <div class="modal-info">${p.author} · ${formatDate(p.ts)}</div>
    </div>
    <div class="modal-body">
      <div class="modal-content">${p.content}</div>
      ${p.photo?`<div class="modal-photo"><img src="${p.photo}"></div>`:''}
      ${p.adminReply?`<div class="admin-reply"><div class="admin-reply-label">🌿 올케어 답변</div><div class="admin-reply-content">${p.adminReply}</div></div>`:''}
      ${isAdmin()?`<div class="admin-reply-form">
        <label class="f-label" style="color:var(--sage)">🔧 관리자 답변</label>
        <textarea class="admin-reply-input" id="adminIn" placeholder="답변 내용...">${p.adminReply||''}</textarea>
        <div style="display:flex;align-items:center;margin-top:8px">
          <button class="btn-admin-reply" onclick="saveReply('${p.id}')">답변 저장</button>
          <button class="btn-del-admin" onclick="delAdmin('${p.id}')">게시글 삭제</button>
        </div>
      </div>`:''}
    </div>
    <div class="modal-foot">
      <button class="btn-modal-close" onclick="document.getElementById('postModal').remove()">닫기</button>
      <button class="btn-del-user" onclick="delUser('${p.id}')">삭제 (비번 필요)</button>
    </div>
  </div>`;
  document.body.appendChild(ol);
}

function saveReply(id){
  const p = posts.find(x=>x.id===id);
  if(!p) return;
  p.adminReply = document.getElementById('adminIn').value.trim();
  savePosts();
  document.getElementById('postModal').remove();
  renderList(); openPost(id);
}

function delAdmin(id){
  if(!confirm('삭제하시겠습니까?')) return;
  posts = posts.filter(x=>x.id!==id);
  savePosts();
  document.getElementById('postModal').remove();
  renderList();
}

function delUser(id){
  openPw('게시글 삭제\n비밀번호를 입력하세요', pw=>{
    const p = posts.find(x=>x.id===id);
    if(!p) return false;
    if(pw===ADMIN_PW||pw===p.pw){
      posts = posts.filter(x=>x.id!==id);
      savePosts();
      document.getElementById('postModal')?.remove();
      renderList(); return true;
    }
    return false;
  });
}

function openWriteForm(){
  photoData = null;
  const tab = currentTab;
  const ol = document.createElement('div');
  ol.className='overlay'; ol.id='writeForm';
  ol.onclick = e=>{ if(e.target===ol) ol.remove(); };
  ol.innerHTML=`<div class="form-box">
    <div class="form-head ${tab==='senior'?'green-head':''}">
      <div class="form-htitle">글쓰기</div>
      <div class="form-hsub">${tab==='pet'?'🐾 펫택시':'🏥 어르신 병원 동행'} 게시판</div>
    </div>
    <div class="form-body">
      <div>
        <label class="f-label">종류</label>
        <select class="f-select" id="wType">
          <option value="inquiry">💬 문의</option>
          <option value="review">⭐ 후기</option>
        </select>
      </div>
      <div>
        <label class="f-label">제목</label>
        <input class="f-input" id="wTitle" placeholder="제목을 입력하세요">
      </div>
      <div class="f-row">
        <div>
          <label class="f-label">작성자 (닉네임)</label>
          <input class="f-input" id="wAuthor" placeholder="ex) 골든맘">
        </div>
        <div>
          <label class="f-label">비밀번호 (삭제 시 사용)</label>
          <input class="f-input" id="wPw" type="password" placeholder="4자리 이상">
        </div>
      </div>
      <div>
        <label class="f-label">내용</label>
        <textarea class="f-textarea" id="wContent" rows="6" placeholder="자유롭게 작성해주세요."></textarea>
      </div>
      <div>
        <label class="f-label">사진 첨부 (선택)</label>
        <input type="file" id="wPhoto" accept="image/*" onchange="previewPhoto(this)" style="font-size:13px;color:var(--text-sub)">
        <div class="photo-preview" id="photoPreview"></div>
      </div>
      <div class="f-notice">📌 비밀번호는 내 게시글 삭제 시 필요합니다.<br>📌 개인정보(전화번호 등)는 포함하지 마세요.</div>
    </div>
    <div class="form-foot">
      <button class="btn-cancel" onclick="document.getElementById('writeForm').remove()">취소</button>
      <button class="btn-submit ${tab==='senior'?'green':''}" onclick="submitPost('${tab}')">등록하기</button>
    </div>
  </div>`;
  document.body.appendChild(ol);
}

function previewPhoto(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    photoData = e.target.result;
    document.getElementById('photoPreview').innerHTML=`<img class="photo-thumb" src="${photoData}">`;
  };
  reader.readAsDataURL(file);
}

function submitPost(tab){
  const title = document.getElementById('wTitle').value.trim();
  const author = document.getElementById('wAuthor').value.trim();
  const pw = document.getElementById('wPw').value.trim();
  const content = document.getElementById('wContent').value.trim();
  const type = document.getElementById('wType').value;
  if(!title||!author||!pw||!content){ alert('제목, 작성자, 비밀번호, 내용은 필수입니다.'); return; }
  posts.unshift({ id:uid(), tab, type, title, author, pw, content, photo:photoData, ts:Date.now(), adminReply:'' });
  savePosts(); photoData=null;
  document.getElementById('writeForm').remove();
  renderList();
}

function openPw(msg, callback){
  const ol = document.createElement('div');
  ol.className='overlay'; ol.id='pwModal';
  ol.innerHTML=`<div class="pw-box">
    <div class="pw-icon">🔐</div>
    <div class="pw-title">비밀번호 확인</div>
    <div class="pw-sub">${msg}</div>
    <input class="pw-input" id="pwIn" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')pwOk()">
    <div class="pw-error" id="pwErr"></div>
    <div class="pw-btns">
      <button class="pw-btn-cancel" onclick="document.getElementById('pwModal').remove()">취소</button>
      <button class="pw-btn-ok" onclick="pwOk()">확인</button>
    </div>
  </div>`;
  document.body.appendChild(ol);
  setTimeout(()=>document.getElementById('pwIn').focus(), 100);
  window._pwCb = callback;
}

window.pwOk = function(){
  const pw = document.getElementById('pwIn').value;
  if(window._pwCb(pw)){
    document.getElementById('pwModal').remove();
  } else {
    const err = document.getElementById('pwErr');
    const inp = document.getElementById('pwIn');
    err.textContent='❌ 비밀번호가 틀렸습니다';
    inp.style.borderColor='#e05050'; inp.value='';
    setTimeout(()=>{ err.textContent=''; inp.style.borderColor='rgba(212,129,58,0.25)'; inp.focus(); }, 900);
  }
};

/* 관리자 — 로고 3번 클릭 */
let lClicks=0, lTimer=null;
document.querySelector('.nav-logo').addEventListener('click', e=>{
  e.preventDefault(); lClicks++;
  clearTimeout(lTimer);
  lTimer = setTimeout(()=>lClicks=0, 600);
  if(lClicks>=3){
    lClicks=0;
    openPw('관리자 비밀번호를 입력하세요', pw=>{
      if(pw===ADMIN_PW){ sessionStorage.setItem('ac_admin','1'); alert('✅ 관리자 모드 활성화'); return true; }
      return false;
    });
  }
});
